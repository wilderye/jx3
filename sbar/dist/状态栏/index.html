eateVNode)(g,{'model-value':c.worldInfo.date,'mvu-path':'世界.日期'},null,8,['model-value'])]),(0,t.createElementVNode)('div',xc,[(0,t.createElementVNode)('span',yc,[(0,t.createElementVNode)('span',null,(0,t.toDisplayString)((0,t.unref)(s)),1),(0,t.createElementVNode)('span',Mc,[(0,t.createVNode)(g,{'model-value':(0,t.unref)(i),'mvu-path':'世界.时间'},null,8,['model-value'])])]),(0,t.createVNode)(g,{'model-value':c.worldInfo.location,'mvu-path':'世界.地点'},null,8,['model-value'])])]),(0,t.createCommentVNode)(' 内容插槽（原 App.tsx 516+ 的内容区域） '),(0,t.renderSlot)(e.$slots,'default')])])],2112))}}),zc=['朝堂','江湖','九天','恶人谷','浩气盟','东海'],kc=['少林','纯阳','万花','七秀','藏剑','唐门','五毒','丐帮','明教','天策','苍云','长歌门','霸刀','蓬莱','凌雪阁','药宗','刀宗','万灵山庄','段氏','衍天','狼牙'],wc={745:{name:'天宝四年',天下:{朝堂:'杨玉环为贵妃。\n安禄山从突厥、契丹、奚、回纥、仆固、新罗、百济、高句丽、室韦、鲜卑、渤海、黑水靺鞨、九番胡等外族重金招揽大批奇人异士，号八千假子。\n安禄山使中田海、葛尔东赞、独孤问俗奇袭雁门关。\n安禄山（42岁）组建狼牙军。',江湖:'稻香村瘟疫，村人四散，莫雨（10岁）与穆玄英（7岁）流浪江湖。\n董龙偷寻空冥诀未果，怒而烧村。\n后稻香村暗藏《空冥诀》一事为宇文兄弟所知，叛军攻入稻香村。\n【蝙蝠帮】夜飞飞欲在霸刀、唐门滋扰藏剑之时，趁乱窃走藏剑炼剑异宝“血铁”，但计划受叶凡所挫【芙蓉教】因十余年前叶芳致错杀芙蓉教长老，穆知美借霸刀、唐门滋扰藏剑之时，率众上藏剑山庄寻衅滋事。\n【铜钱会】展一刀之妻因迷恋叶凡而出走，展一刀遂率众上藏剑山庄寻衅滋事。\n卫栖梧途径长安，遇杨宁不敌被捕，关入武德营大牢。\n陶寒亭（27岁）与其妻方紫霞为楚家打抱不平，入南天别院刺杀高力士义子宋南天，失败后陶寒亭双腿俱断侥幸逃离，方紫霞为不被宋南天之子宋笑声玷污自刎。\n宋南天重金悬赏陶寒亭，一路流亡至长安的陶寒亭被神策军所捕，关押于武德营大牢。\n卫栖梧脱困大闹武德营，并救出陶寒亭，传其二百年前“蓝魔手”从荆卫墓中盗出的《殁蝶刀谱》残篇。\n陶寒亭与楚小妹（楚霞影）行至瞿塘峡，救下因饥饿昏迷的雨卓承并一路同行，雨卓承拒绝随陶寒亭入恶人谷，独自离去。\n谢渊在龙门荒漠追杀楼兰旧部。\n公冶菱令莫蕾助其寻找汉王宝藏。\n红衣教散布疫种，长安爆发大瘟疫。',九天:'无名（王毛仲）去稻香村寻《空冥诀》，唐简在稻香村与无名对战，争夺《空冥诀》李复（23岁）再回稻香村，担任『军师』对抗山贼，但其计划被打乱。'},门派:{少林:null,纯阳:'宇文卓承（雨卓承）（13岁）不满家族野心与周围风气，改名雨卓承并逃离白帝城，宫傲意图将其作为质子获得宇文家族宝藏，派十二连环坞水贼追杀。\n于睿于龙门荒漠遇雨卓承，将其带回纯阳收为弟子。\n方轻崖因古浩出言辱及谢云流，打伤古浩后逃离纯阳，在长安误入赌庄。\n荆空儿与欧阳离离下山寻找方轻崖，发现他已被万花罚恶使带走。',万花:'谷之岚在长安救治瘟疫。\n宋听枫在长安执行罚恶任务。\n纯阳方轻崖被万花罚恶使抓回万花聋哑村。\n姬别情告知谷之岚，她全家被灭门乃是祁进所为蓬莱方鹤影前往万花拜访东方宇轩，声称要化解与方碧玲的误会，实则暗中下毒并企图炸死东方宇轩，被侠士拆穿后逃到天子峰。',七秀:'王维林从长歌门回七秀坊参加碧霞会武。',藏剑:'叶英出关，双目俱盲。\n叶凡（24岁）受唐无言之约前去唐门做客，再遇唐小婉（22岁），与其私奔因叶凡归庄，铜钱会、蝙蝠帮、芙蓉教皆上门滋事。\n柳琪菲（12岁）与多多自北地霸刀归藏剑山庄，父女团聚，柳琪菲遂恢复叶姓叶炜造访明教，唤起何方易（柳浮云）（35岁）的记忆叶凡、唐小婉受江湖散客所围，为谢渊出手相救。\n叶晖在五毒再遇曲云叶婧衣在长安请求侠士救出被杨宁关进武德营的卫栖梧。\n其后柳公子将叶婧衣带入恶人谷，叶婧衣被红衣教劫走，成为红衣教『圣女』。',唐门:'唐简在稻香村与无名对战，争夺《空冥诀》叶凡与唐小婉重逢，二人私奔，唐老太气火攻心，卧床半载。\n唐傲天致力于将唐门暗器与五毒制毒炼蛊之秘术相结合，背后动作不断。\n唐无乐为带回其妹唐小婉，易容为叶凡好友禅心，暗中毒害叶凡。\n叶凡不治，唐小婉悲痛引颈自尽时唐门阿云婆婆赶到，以五阴噬魂散祛除叶凡所中之毒。',五毒:null,丐帮:'詹毅败露后，把郭珠掳至流离岛洪笑尘在丐帮杀了凌雪楼弟子，救下龙俊华詹毅杀害林诚，身份暴露洪笑尘在持国天王殿和龙俊华联手对敌，用降龙十八掌击退龙王，救了达摩院主持。',明教:'明教西域势力渐好，圣女陆烟儿搭建祈盛台，愿与中原武林休战止兵为返中原，陆危楼（65岁）决意重开光明顶密道，置下乾坤大挪移五行阵，教内弟子闯出方可下山。\n叶炜造访明教，唤起何方易（柳浮云）（35岁）的记忆；\n詹毅卧底身份败露。\n长安烈焰庄君填海追随明教二长老赫迪拉辛宣布陆危楼叛教，意图攻占激浪庄取得圣火令。\n鲍穆侠发觉江陵大瘟疫隐情，进行毒田试验。',天策:'朱剑秋其徒商仲永盗取《三才图》，意欲报复天策，但为江湖侠士所破。\n因当年光明寺一事，杨宁前往西域化解恩怨，但在明教被法王克辛波所伤。\n后在龙门荒漠化名为『红袍将军』，救皇甫惟明曹雪阳与皇甫少华一起攻打南诏军队。',苍云:'奚人空降，安禄山假借增兵支援却反戈雁门关守军，大唐雁门关守将、『玄甲苍云军』统帅薛直（47岁）战死，副统帅『血手凤凰』长孙忘情（34岁）继任『玄甲苍云军』统帅。\n风夜北（29岁）在雁门关战争中失明，申屠笑战死战况多次上报帝京却遭李林甫混淆视听，朝廷扣去苍云半年粮饷，不准再提。\n原太和堡大修，其下始建苍云堡。',长歌门:'赵宫商与韩非池争执，琴箫相斗，被杨青月制止张九龄为苍云一事复出，狼牙军暗影卫受命刺杀张九龄、李白于长歌昭贤日，被击退。',霸刀:'庄主柳惊涛与唐小婉订下婚约。\n柳静海为柳惊涛的婚事前往唐门，知道了唐书雁已是塔纳首领。\n因叶凡、叶炜积怨爆发，霸刀山庄广发英雄帖，招天下侠士散客、漠北七怪大闹藏剑山庄。',蓬莱:'方乾力排众议，开放海天大祭方子游独自一人乘船从异国返回蓬莱。',凌雪阁:'二月，宰相党势大，李隆基命皇子李俶接任外阁阁主，李泌为谋士。\n机枢府闻人无声查到李林甫暗通吐蕃的蛛丝马迹，李林甫与隐元会交换信息，截杀闻人无声。\n六月，时任机枢府归辰司主管闻人无声与昭明苑使容闲身死长安。\n林白轩接任机枢府归辰司。\n八月，凌雪阁小分队前往晟江黄槲镇接龙岩怀，消息通过江潮为凌雪楼所知，任务失败。\n九月初五，凌雪阁杀岳寒衣，凌雪楼归于外阁，不再独立于内外两阁之外。',药宗:'稻香村突遭变故，陈商将女儿托付给万花紫晴，并将《无方制物经》和《药典》残卷交予陈月。',刀宗:'左伶拜入刀宗，为练红洗首徒方轻崖打伤古浩，离开纯阳。',万灵山庄:null,段氏:null,衍天:null,狼牙:null}},746:{name:'天宝五年',天下:{江湖:'菩提会接受杨国忠（44岁）的邀请入唐，人称『天竺迦兰僧』，修建战宝迦兰寺。\n少林寺藏经阁的《易筋经》被盗。\n少林弟子为夺回《易筋经》进入战宝迦兰，取回上卷。\n后迦兰僧投奔吐蕃。\n南诏占据滇池地区，实力大增。'},门派:{少林:'少林寺藏经阁的《易筋经》为菩提会所盗。\n玄正认为道衍口业过重，不入佛理，派他出门寻找失窃的《易筋经》，后道衍（28岁）终于在战宝迦兰寻得上卷渡法指点武林人士攻破战宝迦兰的办法。',纯阳:'祁进暗中护送谷之岚至巴陵，清除在巴陵与宇文氏勾结的天一教。',万花:'阿麻吕在日轮山城为父报仇僧一行在龙门荒漠寻找谷烟河徐淮遍尝百草中毒而亡林白轩（30岁）独自前往金水报家仇，但未能手刃仇人，后又返回万花谷陈月（9岁）跟随紫晴回到万花谷，成为万花弟子。',七秀:null,藏剑:'叶孟秋将叶琦菲带入剑冢，传授剑术。',唐门:null,五毒:null,丐帮:null,明教:null,天策:null,苍云:null,长歌门:'唐简在枫华谷帮助李白看清世道和皇权之乱。',霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:null,万灵山庄:null,段氏:null,衍天:null,狼牙:null}},747:{name:'天宝六年',天下:{江湖:'唐王室发现《山河社稷图》残卷丢失一事，李倓得知其下落，将此消息透露给南诏王阁罗凤。\n阁罗凤找到白眉鼠王、青翼蝠王与智慧王一起准备搭救萧沙。\n求那拔十歇于武夷山废于阗女魔历蘅香内力尽失，厉蘅香从此隐居成都乡间。\n莫雨和穆玄英被激浪庄抓走。\n浩气盟发长空令，召集武林各派弟子讨伐十二连环坞。\n神策军与恶人谷众恶人各怀心思，暗中阻挠。\n藤原广嗣欲于宫中神武遗迹，扰乱谢云流与李忘生会面，遂发信各门派说谢云流准备杀掉李忘生。'},门派:{少林:'少林禅宗高僧渡明大师（101岁）坐化，其弟子玄生（79岁）搭乘南洋商会的商船由海路送渡明大师之舍利子返回少林寺，中途为寇岛倭寇所劫。',纯阳:null,万花:null,七秀:null,藏剑:null,唐门:null,五毒:null,丐帮:null,明教:'谷烟河携圣火令返回明教，途径龙门遭多方抢夺。',天策:null,苍云:null,长歌门:null,霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:'洛风寻至刀宗，希望师父谢云流能与纯阳说清当年的误会，化解恩怨，浪三归深以为然，最终谢云流答应与李忘生会面。',万灵山庄:'颂少风私自前往洛阳，途中无意吸引了其他门派的宠物，引来追查的其他门派弟子。\n后被颂山寻回。\n颂潮生离世，颂少风得知家族隐居真相，立誓弥补过错，洗刷污名，使兽王庄重新立足于江湖。',段氏:null,衍天:null,狼牙:null}},748:{name:'天宝七年',天下:{江湖:'【星宿派】赞普尺带珠丹集吐蕃武林伐星宿海，老仙千秋子东逃南诏。\n【蝙蝠帮】萧沙被救出后，武逸青重出江湖。\n穆玄英（10岁）于枫华谷坠崖，被司空仲平救走，进入浩气盟王遗风派烟去巴陵调查十二连环坞莫雨（13岁）跟随王遗风进入恶人谷，在巴陵找董龙报仇皮逻阁谢世，阁罗凤立。\n阁罗凤成立一品堂，联南诏六脉宫、苗疆天一教、吐蕃星宿派、巴蜀青城、红衣教等门派拓展南诏武力。\n天竺伽蓝僧智慧王受南诏资助，与武逸青、胡鞑计闯少林持国天王殿，救出血眼龙王萧沙，投靠南诏。',九天:'李倓蛊惑阁罗凤发起南诏武林大会，旨在重创中原武林。'},门派:{少林:'澄睿（57岁）叛出少林寺，投奔恶人谷，改名『陈和尚』。\n在龙门荒漠遇见于睿，与于睿发生争执。',纯阳:'雨卓承离开纯阳，前往万花聋哑村救出方轻崖。',万花:null,七秀:null,藏剑:null,唐门:null,五毒:null,丐帮:null,明教:null,天策:null,苍云:null,长歌门:null,霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:'左伶与其他刀宗弟子一同随藤原康成前往云湖天池与昆仑派争夺《寒冰诀》的下落。',万灵山庄:null,段氏:null,衍天:null,狼牙:null}},749:{name:'天宝八年',天下:{江湖:'萧沙（72岁）被营救出少林寺王遗风整治恶人谷，引起康雪烛、陈和尚、柳公子的不满，三人叛逃出恶人谷穆玄英入浩气盟。\n沙利亚死于荻花前山，后被炼成尸人。'},门派:{少林:null,纯阳:'李忘生到宫中神武遗迹见谢云流，想解开多年误会却被怀疑，未果。\n于睿跟随掌门前往宫中神武遗迹；\n前往瞿塘峡捉拿雨卓承，但后来不忍，并没有将他带回师门。\n在宫中神武遗迹，洛风为祁进误杀。',万花:'宇晴（六诏之浪穹诏公主罗尼玛）前往荻花后山，与牡丹（六诏之越析诏王子阿拉木曲比）相认。',七秀:null,藏剑:'叶婧衣被困于荻花宫前山，肖药儿看中她三阴逆脉的体质，谎称自己孙女走失，委托侠士前往荻花宫营救叶婧衣。\n一名红衣教男子为安抚叶婧衣，假扮卫栖梧守护在其身侧直至战死。\n（出自掉落道具《人皮书》）',唐门:null,五毒:null,丐帮:null,明教:'萧沙被救出少林寺。\n天策少林赴明教和解，杨宁抗下克辛波三掌。\n明教夺走萧沙手中半份山河社稷图。',天策:null,苍云:null,长歌门:null,霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:'谢云流到白帝水宫救走楚小妹和宇文卓承，将其带回刀宗。\n谢云流在宫中神武遗迹与李忘生等人相见，产生误会，洛风为祁进误杀，谢云流带洛风离开。',万灵山庄:null,段氏:null,衍天:null,狼牙:null}},750:{name:'天宝九年',天下:{朝堂:'安禄山进封东平郡王，节度使封王始于此。\n8月，安禄山兼河北道采访处置使。\n南诏王阁罗凤投靠吐蕃，共反大唐朝廷，天策府组织轩辕社入南诏寻找《山河社稷图》残卷。\n天南王家宣布捉住『血眼龙王』，开屠龙大会，借机囚禁各大门派掌门。',江湖:'南诏王于龙渊泽开设擂台，丽雅莎引武林人士潜入荻花圣殿萧沙、三大恶人投靠南诏王阿萨辛修建剑湖宫，在无量宫中帮助南诏国反对大唐朝廷乌蒙贵以小邪子的母亲相胁，让小邪子于毒神殿修炼《毒神忘情蛊》谢渊在白龙口调查『血眼龙王』之事；\n在法王窟追杀青翼蝠王、白眉鼠王；\n在持国天王殿赶过去协助少林寺，镇压跑出的龙王；\n在苍山洱海和穆玄英一起追『血眼龙王』，阻止『血眼龙王』把《山河社稷图》残卷给南诏王，碰到了来追三大恶人的王遗风和莫雨。\n唐门被狼牙军围困，月弄痕、影、穆玄英前去解围。',九天:'方乾在黑龙沼救出魔刹罗李倓（24岁）在成都伪装成南诏剑神向中原武林挑衅，欲嫁祸给剑圣。\n李复在成都揭穿李倓南诏剑神的身份，并在黑龙沼得知李倓等人想对付剑圣的计划后，前往寇岛寻找海图，先后出现在南诏皇宫、苍山洱海等地，观察局势。\n剑圣于融天岭追查假冒自己之人，并协助李承恩逼退李倓。\n（此处《隐元年鉴》描述为“李承恩（40岁）战于融天岭，李倓为剑圣所救。”/游戏内《剑侠录》描述为“艾春秋设计以烽火引出南诏剑神，李承恩黄雀在后。李承恩指责南诏剑神假扮剑圣与血眼龙王四处设局，但最终却不敌南诏剑神，幸而剑圣赶至将李承恩救下。而后凤迦异出现将南诏剑神带走。”因剧情表现和人物台词都模棱两可，故于此处将两种描述都注明）李倓在白龙口掩护智慧王逃逸，并给朱剑秋假消息。\n李倓辅助南诏国反对大唐朝廷，但同时阻止其侵略中原赵涵雅在无量宫受到蛊惑，成为红衣教『圣女』，后被源明雅阻止。'},门派:{少林:null,纯阳:'祁进在成都对抗南诏剑神。\n在纯阳遇见谢云流，谢云流要祁进给洛风偿命。',万花:'司徒一一前往南诏，勾结天一教，为其制造机甲。',七秀:null,藏剑:'叶凡唐小婉大婚叶蒙在成都揭穿李倓南诏剑神的身份卫栖梧为救叶婧衣，替阿萨辛盗取白龙珠。\n阿萨辛在荻花圣殿被侠士击败后，卫栖梧带叶婧衣远走避世，不久后在太原附近成婚生女。',唐门:'唐简在唐门密室现身，教训唐傲天唐傲天在唐门密室给叶凡出难题。\n唐门被狼牙军围困，谢渊派月弄痕和穆玄英前去唐门支援，与影不期而遇。\n唐傲天让穆玄英在唐门住下，为了夺取穆玄英手上的剑谱，用计把穆玄英引到南诏送死唐书雁在五毒仙踪林揭露当年乌蒙贵叛变之事，并与曲云谈判塔纳出路，得知妹妹被逼婚后返回唐门叶凡唐小婉大婚。',五毒:null,丐帮:null,明教:'鲍穆侠找寻明教下落来到黑龙沼，只身营救小邪子被炼制成傀儡。',天策:'天策府组织轩辕社入南诏寻找《山河社稷图》残卷李承恩（40岁）与冒充剑圣却被识破的李倓（24岁）战于融天岭，李倓为剑圣所救。\n杨宁前往黑龙沼寻找《山河社稷图》残卷，受伤玄正与叶英等五大掌门被李倓等人设计抓到融天岭，后转困烛龙殿。',苍云:null,长歌门:null,霸刀:'叶凡唐小婉大婚，柳惊涛前往抢亲。',蓬莱:'方子游成为东海霸王擂魁首『海状元』',凌雪阁:null,药宗:null,刀宗:null,万灵山庄:null,段氏:null,衍天:null,狼牙:null}},751:{name:'天宝十年',天下:{朝堂:'唐将高仙芝率军攻大食于怛罗斯，败没。\n大唐颓势已现。\n朝廷为安禄山起第于亲仁坊，并以其兼河东节度使，此时安禄山已握三镇重兵二十万。\n8月，安禄山攻契丹，败没。',江湖:'天南王家宣布捉住『血眼龙王』，开屠龙大会，借机囚禁各大派掌门。\n乌蒙贵（57岁）被各门派围攻于烛龙殿，武功被废。\n玛索以毒人恢复之法保下乌蒙贵性命。'},门派:{少林:'澄正、渡法前往烛龙殿解救被困的玄正，渡法为玄正除去锁链的束缚并传内力疗伤。',纯阳:'上官博玉、于睿、刘梦阳前往烛龙殿营救被困的李忘生。',万花:'东方宇轩携裴元、阿麻吕等万花弟子帮助五毒长老艾黎铲除天一教，其后东方宇轩前往烛龙殿为被抓的掌门送药而自投罗网被抓，林白轩、僧一行前往营救。\n苏雨鸾在烛龙殿外治疗各门派伤者。',七秀:'小七前往烛龙殿营救叶芷青，萧白胭在烛龙殿外阻击天一教余孽。\n天一教圣童索笛尔向叶芷青求爱，被叶芷青用棋局困住，最终被李承恩与小七击杀。',藏剑:'叶泊秋、叶炜前往烛龙殿营救叶英。',唐门:'唐书雁、唐老太太前往烛龙殿找乌蒙贵算账。',五毒:'曲云、孙飞亮前往烛龙殿追杀乌蒙贵，决战中方乾、魔刹罗赶来助阵。',丐帮:null,明教:'卫栖梧盗走红衣教圣象，携叶婧衣至明教求助，阿萨辛陆危楼再遇。',天策:'李承恩、杨宁前往烛龙殿营救各大掌门。\n而后回归天策，在府中静养。',苍云:null,长歌门:null,霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:'谢云流前往烛龙殿协助斩杀醉蛛老人。',万灵山庄:null,段氏:null,衍天:null,狼牙:null}},752:{name:'天宝十一年',天下:{朝堂:'阁罗凤自立，国号大蒙京兆尹杨国忠加御史大夫。',江湖:'康雪烛在南诏皇宫帮助李倓。\n米丽古丽、陶寒亭在无量山协助王遗风追杀三大恶人陈和尚在南诏皇宫帮助李倓，被杀。\n柳公子在南诏皇宫帮助李倓。\n在无量山被王遗风追杀，逃走。'},门派:{少林:null,纯阳:null,万花:'宇晴在苍山洱海追忆当年旧事，在南诏皇宫与牡丹重逢。',七秀:null,藏剑:null,唐门:null,五毒:null,丐帮:null,明教:null,天策:'曹雪阳攻打南诏皇宫，守卫长安、洛阳。',苍云:'李复成为玄甲苍云军的客卿，提供玄甲冶炼之地与《幽霜渊甲图》给苍云军。',长歌门:null,霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:null,万灵山庄:null,段氏:null,衍天:null,狼牙:null}},753:{name:'天宝十二年',天下:{朝堂:'陇右节度使哥舒翰兼河西节度使，封西平郡王段辰复寻得东海徐福遗民孑孑，化名段莺莺，许以安禄山，后得一子安庆恩。',江湖:'李林甫被杀，杨国忠代相，兼吏部尚书，怙权仗势，台省官有才名而不为他所用者都被排斥。'},门派:{少林:null,纯阳:null,万花:null,七秀:null,藏剑:null,唐门:null,五毒:null,丐帮:null,明教:null,天策:null,苍云:null,长歌门:null,霸刀:null,蓬莱:null,凌雪阁:'李林甫（68岁）被杀，朝廷对外宣称抱病而终。',药宗:null,刀宗:null,万灵山庄:null,段氏:null,衍天:null,狼牙:null}},754:{name:'天宝十三年',天下:{朝堂:'安禄山入朝，任尚书左仆射。\n李隆基、杨玉环召见安禄山于华清宫，摆梨园宴。\n杨国忠遣李宓将兵七万攻南诏，败没。',东海:'林文继任林家家主。'},门派:{少林:null,纯阳:null,万花:'颜真卿联合唐门发“刺虎”行动，于华清宫刺杀安禄山未成，禄山遁走。',七秀:null,藏剑:null,唐门:null,五毒:null,丐帮:null,明教:null,天策:null,苍云:null,长歌门:null,霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:null,万灵山庄:null,段氏:null,衍天:null,狼牙:null}},755:{name:'天宝十四年',天下:{朝堂:'2月，安禄山以藩将三十二人代汉将。\n11月，安史之乱爆发，安禄山率同罗、奚、契丹、室韦凡十五万众，号二十万，以讨杨国忠之名，反于范阳。\n唐廷遣安西节度使封常清赴洛阳募兵迎战。\n又以郭子仪为朔方节度使、王承业为太原尹、张介然为河南节度使、程千里为潞州长史。\n任荣王李琬为元帅、高仙芝为副元帅进屯陕郡，又令宦官边令诚为监军，宦官监军始于此。\n安庆绪与铜钱会前掌门钱南撰共谋中原商会。\n12月，武牢关破，洛阳陷。\n封常清退守陕郡。',江湖:'萧沙（77岁）在战宝军械库被徒弟韦柔丝偷袭，而后与王遗风对战，力竭而死。'},门派:{少林:null,纯阳:null,万花:null,七秀:null,藏剑:null,唐门:null,五毒:null,丐帮:null,明教:null,天策:null,苍云:null,长歌门:null,霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:null,万灵山庄:null,段氏:null,衍天:null,狼牙:null}},756:{name:'天宝十五年',天下:{朝堂:'正月，封常清、高仙芝弃陕郡，退守潼关，遭边令诚奏斩。\n哥舒翰后继守潼关。\n5月，郭子仪收复河北十余郡。\n6月，杨国忠恐哥舒翰兵权在握，令其出关收复洛阳，途中遭伏，败没。\n潼关失守，长安陷，李隆基奔蜀，于马嵬驿杀杨玉环、杨国忠。\n郭子仪义子郭天纵奉命护送杨玉环经一线天逃离。\n7月，太子李亨即位灵武，年号至德。\n渤海国迁都龙泉府；\n安史之乱时，大钦茂为免受战火波及，远迁上京，加强了与日本的联系。\n吐蕃趁机夺唐陇右、河西、西域等四镇。\n武牢关守将闻人彦范长期为何广排挤，不满军师司马兴卷走军中财物，开虎牢关，降安禄山。',江湖:'天一教与狼牙军联合，献上“金蛇剑”给狼牙军作见面礼；\n玛索在战兽山去世，也漠河同部分花卫奉玛索为神，隐居黑山林海朝曦村。',九天:'李复出现在马嵬驿，观察李倓的动向李倓与伊玛目、无名分道扬镳。\n薛北辰（小无名）意欲借天一教之毒在大明宫毒杀剑圣。\n但终究失败，临死前才知道老无名并未死去。\n薛北辰的尸身被其部下木心瑶带走，送至风雪崖顶的芸儿及其母处。\n其亲信『天字零号』携隐大人令逃入风雪稻香村。\n无名（王毛仲）勾结安庆绪并派『冷血十三鹰』去稻香村追查『隐大人令』的下落史朝义拉拢伊玛目，在风雪稻香村夺取『隐大人令』并逃走。\n李复去风雪稻香村追查『隐大人令』，得知王毛仲是当年杀害父亲、追杀母亲和自己的元凶方乾与李复、周墨等人一同察觉李倓、无名等人意图杀害剑圣，在大明宫里安禄山的加冕之礼上，指引闯入宫中的江湖侠士阻止了这场阴谋。\n在剑圣传功给穆玄英，并给穆玄英和可人设下考验后，中毒的剑圣被方乾带回侠客岛救治伊玛目与无名、李倓等人意图在大明宫中谋害剑圣，被李复与方乾等人识破。\n伊玛目抓住可人以胁迫剑圣，将剑圣等人逼退。\n6月，李倓策动马嵬驿兵变，助李亨即位。'},门派:{少林:'方丈玄正令护寺武僧保护山下村民，加强本寺戒备，不接受狼牙军的任何示好行为。\n表面上并未帮助大唐军队，私底下派出武僧将洛阳城中的部分百姓和皇家宗室接到后山安置。',纯阳:'纯阳宫为狼牙所监视，祁进屡同狼牙起冲突，后愤然下山，不知去向纯阳宫上下一如往昔，求真修道，不染凡俗。\n然而私底下派出高级弟子潜入长安，救助百姓和皇室成员，偷藏在空雾峰中。',万花:'颜真卿离谷出任平原太守，与常山太守颜杲卿共击叛军，河北十七郡应之。\n长安陷落，东方宇轩封万花谷，禁外人入谷。\n孙思邈（175岁）携阿麻吕、裴元出谷悬壶济世。\n陈月（19岁）在杨上善的指点下出万花谷，为寻求自身病症的解药和遗失的药宗秘籍，踏上了寻找北天药宗遗址之旅，途中在枫华谷重遇穆玄英和莫雨工圣僧一行不愿入世，亦派门下弟子去往北方，用先进的技艺帮助唐军琴圣苏雨鸾挂心七秀坊，同画圣林白轩回到扬州，协助叶芷青。',七秀:'坊主叶芷青带领外坊精锐弟子同扬州太守镇守扬州城，组织百姓避难，不善武功的秀坊弟子则留在坊中裁剪布料，缝制新衣。\n楚秀萧白胭率领内坊精英弟子携带姑娘们做的衣服和食物前去北方，支援唐军，内外坊空前团结，不分彼此。\n叶芷青发下门主令，让天下的七秀坊弟子互助互爱，拯救百姓，对抗狼牙军。\n小七在战乱天策中救下秦颐岩的妻女。',藏剑:'叶英亲开吴越古剑炉，取西湖血铁、湖边寒泉冶铸兵刃千柄。\n又开藏剑武库，清点庄中所藏兵器千余把，悉数赠与朔方军。\n叶晖出尽庄中钱财赈济灾民。',唐门:'唐简以神秘老者的身份出现在风雪稻香村，阻止无名夺『隐大人令』唐傲天野心勃勃，借战乱之机，秘密修建两座兵器库，私下里分别卖兵器给唐军和狼牙军，趁战乱发了一笔财。\n他命令门下弟子就地待命，不要介入双方斗争，待门中需要之时召回蜀中。',五毒:'曲云在战乱长安帮助卓婉清和慕容追风曲云带着德夯孙飞亮，同部分忠心弟子，回到中原，探望七秀坊姐妹，以及消灭天一教余孽。\n曲云在教主令中说道，五圣教弟子，可回苗疆避难。\n若不愿坐视苍生罹难，也可留在中原，搭救些受难百姓，但切勿卷入战争之中。\n曲云于战乱长安救下谷之岚带回苗疆，并分其与祁进各半块玉玦，望其以后凭此玉玦重逢，再续前缘。\n天蛛使容夏与风蜈使纳罗叛变。',丐帮:'郭岩号召五十万弟子协唐军抵御狼牙，郭岩、尹放皆遭万金悬赏。\n沈眠风暗中与狼牙军勾结，叛出恶人谷，将尹天赐转移至长安沈园地牢。\n尹放前往沈园营救尹天赐，被沈眠风用计重创，尾随而至的郭岩击退沈眠风，救出尹天赐父子返回丐帮。\n长安书香世家曾家逃难途中为疫情波及，千金莲儿流落街头，为郭岩所救，并收为徒。\n尹放诈俘，从内部突入大明宫。',明教:'明教东归不久，便遇安史之乱。\n明教本部远在大漠，不用忌惮狼牙军的侵袭。\n而自明教东归以来，传教之路困难重重，陆危楼想要借此机会重回第一大教的地位，于是明教企图同唐皇合作，扶持唐皇反击狼牙。\n萧沙等伪明教投靠安禄山，占领激浪庄寻找剑阁大光明宫宝图，谷碧湖接引陆危楼取走宝图夺回激浪庄；\n何方易至马嵬驿打探李重茂消息。',天策:'在『安史之乱』中，狼牙叛军围攻天策府数月，为保唐玄宗逃离长安，李承恩突围，杨宁战亡，天策府失陷。\n朱剑秋在天策战乱中破阵曹雪阳与兄长曹炎烈在洛阳武牢关相逢，因理念与选择不同而决裂。',苍云:'正月，王不空入静边军城，斩周万顷。\n郭子仪率朔方军攻城，静边军破。\n雁门关之战，郭子仪、宋森雪由东陉关攻东门，王不空由苍云堡密道攻南门，长孙忘情、风夜北攻北门，雁门关光复。\n苍云敖侯营、郭子仪义军暗闯直城门，破坏正在组装的“恶狼”城防系统。',长歌门:'王维被困长安，为叛军所俘，王维林一路辗转寻找未果。',霸刀:null,蓬莱:null,凌雪阁:null,药宗:null,刀宗:'前任披星阁阁主连瑞为护送逃亡百姓而战死，左伶接任披星阁阁主一职。',万灵山庄:'安史之乱爆发，颂少风携兽王庄帮助寻找狼牙军狼骑的破解之法。',段氏:null,衍天:null,狼牙:'正月，安禄山于洛阳称大燕皇帝，年号圣武，封安庆绪为『太子』。\n在『安史之乱』中，狼牙军占领天策府，从一线天逃离的杨贵妃为狼牙军师徐归道俘获，并被献与安禄山6月，取潼关，狼牙军入长安。\n伊玛目、阿萨辛欲组新拜火教为大燕国教，授安禄山“灵光之神”之称，于大明宫择日加冕，后加冕仪式尹放所破坏。\n令狐伤得华清宫始皇龙辇车遮阳铜伞中神兵“始皇龙辇秘剑”，解开始皇武库之谜。\n范阳路远，粮草难行。\n徐归道、哈尼斯前往各地搜寻粮草，就地建大燕粮仓。\n狼牙于黑龙沼遗迹之塔发现天一教以毒虫驭人巫术《驭毒术》。\n安庆绪遣史朝义密会王毛仲于风雪稻香村。\n9月，范阳狼牙堡守城防御器械进置长安城。\n直城门陷，安守忠退守春明门。'}},757:{name:'至德二年',天下:{朝堂:'正月，永王李璘受李重茂唆使，叛于江陵。\n2月，平李璘。\n建宁王李倓发还巢之战，唐皇于灵武设奖颁旨，召中原群侠于唐燕两军交战之时，夺取各地大燕粮仓中粮草还于唐民。\n张良娣、李辅国误国，李倓私率建宁铁卫支援李光弼。\n李亨遂赐死李倓，于天泣林为长歌所救，李倓淡出朝野。\n唐取黑水城，获跋汗支持，得寒玉铁。\n李守礼之子李承寀奉旨出使回纥，向回纥英武可汗磨延啜借兵，并接受其提议迎娶回纥公主药葛罗氏为妃。\n唐军、回纥军十五万攻陷长安。\n9月，唐军、回纥军十五万攻长安。\n10月，郭子仪收复两京，李亨入西京。\n11月，李隆基还西京，李辅国干政。',江湖:'江湖人士齐聚太原，方乾当选武林盟主，众位侠士歃血缔约，誓与狼牙军对抗到底。\n公冶菱与莫蕾入阴山圣泉寻找《汉王图》关键部分《龙图录》，未有收获。\n李亨于灵武设奖颁旨，令李倓发动“还巢”之战，召中原群侠夺取各地大燕粮仓中粮草还于唐民，恶人谷与浩气盟瓜分占领合计二十六处狼牙据点。\n康雪烛因得罪康杖石，被迫违誓与柳公子及尹家尹慧照前往黑戈壁寻找地下宝藏。\n恶人谷巨匠顾宁海于昆仑始建凛风堡，堡成之日，灯油枯尽，吐血而亡。\n狼牙气天王哈尼斯坚守世外坡，恶人谷强攻四十余日方破。\n莫雨在花月别院听了韩非池一曲后，得知自己正是杀害家人的凶手。\n莫雨与穆玄英再度决裂。\n沈眠风追杀尹天赐至经首道源岛莫雨前往洞天福地寻找治疗疯症之法可人潜入狼牙堡刺杀史思明穆玄英随可人潜入狼牙堡，逼降史思明张桎辕、僧一行于南屏山建武王城，落成后图纸不翼而飞。\n穆玄英于五台山参悟剑圣所留《洪元剑谱》残篇。\n穆玄英领谢渊之令，同翟季真一起随尹放共同护送尹天赐前往东海，途中遇沈眠风偷袭，翟季真受伤。\n翟季真受伤后愈发力不从心，后为消灭蛊王蛛，以身做饵牺牲。\n月泉淮吸食人内力之事被揭穿，渤海国迫于唐王朝的压力，对月泉淮下追缉令阿目玛率教众私下屡劫回纥商道，却又施恩传教于回纥，后事情败露被杀藤原广嗣从李重茂处得知弟弟藤原良继准备接他回东瀛联手对抗政敌橘家。',九天:'李倓私率建宁铁卫支援李光弼。\n张良娣等人遂向李亨进谏谗言，李亨下诏赐死李倓，长歌门于天泣林营救，途中遭林白轩与凌雪阁成员阻止。\n徐归道、曹炎烈诈降，意图引李俶入上阳宫受降表并除之，李倓易容代其前往，李复随行。\n李俶中毒后身体虚弱，李倓常扮作李俶，代兄奔走，并阻止回纥大肆劫掠百姓方乾、剑圣于五台山留下《洪元剑谱》残篇等待传人公冶菱、苏曼莎、令狐伤皆闯无名治下阴山圣泉曹雪阳部下，安插在安庆绪身边谍探“阶苔”身份暴露，遭上代无名追杀。\n赵涵雅在太原与叶琦菲重逢，其后在与源明雅寻找龙脉途中，被追杀进入璀璨海厅，被叶炜父女所救。\n叶琦菲一路护送二人到五台山，赵涵雅以卜卦得出霸刀生变，叶琦菲前往霸刀，而赵涵雅与源明雅继续前往东海寻找龙脉，连破离火生树阵和振雷风电阵，进入大衍盘丝洞襄阳王李玚绑架了商会成员，周墨和李复前去仙侣庭院营救，得知李白已经成为永王幕僚。',东海:'东海康家主康杖石遣管家康辞远赴中原寻康雪烛与尹慧照，康辞于途中结识白璃予，同赴七秀滋扰。\n康雪烛奉康杖石之名与柳公子及尹家尹慧照前往黑戈壁寻找地下宝藏。\n周宋暗中保护康念返回洞天福地岛。\n源明信奉父命前往东海夺回须巢童树康家少主康宴离在康宴别的帮助下假死，与齐之曼私奔。\n文霄汉为救康念而死，临死前将灵果交给康念，托她转交康华真旁系首领康成辩不满康杖石的变态统治，暗中联合日本源氏企图推翻康杖石。\n泥兰洞天中，康成辩意欲毁树，被康杖石发现；\n须巢童树在争夺中为源明信所毁。\n康杖石去世。'},门派:{少林:'鉴真和尚东瀛弟子仲虚念率东瀛僧侣团来访辩经论法。\n仲虚念阴郁乖戾，争论之中走火入魔。\n后遭澄正、澄实、澄理、澄信所伏，幡然醒悟，从此在少林山道平台扫地，参悟佛法。',纯阳:'服下忘情蛊的祁进再度于太原结缘谷之岚。\n刘梦阳携子杨天随李无衣前去苍云，刘梦阳把《杨家枪谱》的招式诀要交给李无衣因燕小霞于五台山玄贞观遗址寻回《老子西昇经》原本，纯阳首办“西昇祭”大典，祭祀三清老祖。',万花:'僧一行出谷协助太原工匠建造守城器械。\n林白轩现身天泣林，与凌雪阁成员会面，阻止江湖侠士搭救李倓陈月听闻北天药宗的遗章在洛阳，从长白动身前往洛阳，遇见长孙笑，并救下中毒的叶琦菲。\n东方宇轩开谷济世，一队万花弟子追随张巡加入唐军，增援睢阳前线。\n谷之岚支援太原，与祁进重逢，二人前尘尽忘。\n谢云流断祁进一臂，偿祁进当年误杀洛风之事。',七秀:'小七与李无衣于太原伐木场联手斩杀白陶之徒白璃宫白璃予为报师父白陶败于高绛婷之仇，借康辞挑起事端，滋扰七秀剑舞考核。\n其姊、龟兹第一乐师白陶大弟子白璃予上门寻仇。',藏剑:'叶琦菲在太原助李光弼平抑物价，与赵涵雅重逢，其后在璀璨海厅救下寻找龙脉途中被追杀的赵涵雅、源明雅，一路护送二人至五台山。\n赵涵雅告知霸刀有变，叶琦菲前往霸刀，赵源二人前往东海。\n叶炜在太原重逢何方易，并见到了失踪多年的叶婧衣，发现叶婧衣已经与卫栖梧成婚并育有一女卫琉璃。\n其后在璀璨海厅助叶琦菲击败宫溟。\n在唐军收复两京之战中，霸刀、藏剑等门派为襄助唐军并追查兵器失落之事，前往洛阳。\n叶凡携妻外出游历，于黑戈壁发现罕见寒铁，传书山庄，叶英遂亲赴黑戈壁取矿。\n叶英途经阴山大草原，闻得令狐伤正重游此地，故追随而去，赠其《问道剑心得》，以了陆浩遗愿。\n叶晖重开炼天炉，叶英集全庄武艺高强弟子之精血，以寒玉铁冶铸怀刃剑，剑出当日，狼牙军慕容古前往夺剑被击退。\n藏剑山庄运往洛阳城的兵器被狼牙所劫，叶琦菲前往调查，身中蛇毒，被陈月所救。',唐门:'唐门内乱，唐傲侠公开对峙唐傲天。\n唐简让王玄砚带『隐大人令』出席九天密会。',五毒:'公冶菱与乌缇夜加深研究《尸咒》秘术，成功将鸟兽与植株特性相融，研制出了新的植兽。\n乌蒙贵野心复燃，天一教驱使新培育出的植兽“噬魂金虎”进犯五毒。',丐帮:'红衣教新任圣女月华带领属下将占领太原杏花村，郭岩认出其真实身份为自己与唤晴第二女郭珍，意图将其带回丐帮，郭珍不从，郭岩不忍亲手诛女，任其逃走。\n郭岩、康华真等人为逐渐康复的尹天赐举办寿宴，宴上沈眠风来犯，为众弟子击退。\n尹天赐被沈眠风折磨多年，被救出时已近油尽灯枯，康华真不顾众人反对，以换血之法保住尹天赐性命。\n后和康华真在穆玄英的护送下前往东海尹小荷前往洞天福地岛为康华真求取灵果。',明教:'左护法何方易强占太原矿场，夺伏龙陨铁，实为霸刀之兴何方易、叶炜太原再遇。\n卡卢比于黑戈壁与拔汉族和解，再遇于睿。\n明尊大典举行，何方易返回霸刀，被魔刀所伤。',天策:'狼牙军主力转向太原，与苍云军会合的天策府众人顺利夺回天策府曹雪阳置于安庆绪身边的谍探“阶苔”身份暴露，被王毛仲领隐元会杀手追杀至天策。\n王毛仲被曹雪阳领兵击退。',苍云:'狼牙军主力转向太原，苍云军协助天策府众人夺回天策府。\n宋森雪在永王行宫得知自己是李重茂之子刘梦阳携子杨天随李无衣前去苍云，斩凌雪阁叛徒卢卫都于长安武德营。\n史朝义麾下大将李怀仙领精锐骑兵与吐蕃僧袭击晋祠夺取太原粮道，道衍前往阻拦中计被困，在王不空支援下击退吐蕃僧，斩杀李怀仙。\n奚人首领巴特尔之子库莫，大将唐和斯、塔拉、萨楚日进犯东陉关。',长歌门:'睢阳血战，长歌四绝张巡以千百就尽之卒，战百万日滋之师，蔽遮江淮。\n坚守十月后城破战亡。\n凤息颜为调查昆仑兵器失窃之事，随门主杨逸飞前往战乱洛阳；\n周墨携旗下商会倾尽一切物资，支援太原守军，郭子仪军队，以及苍云军。\n李复和周墨父子等人在永王行宫中见到李白，对李白成了永王幕僚感到惊讶；\n康念返回洞天福地康家；\n周宋暗中护送康念返回康家；\n杨青月偶遇一自称北天药宗门下，经其用药月余，不再堕入噩梦；',霸刀:'在唐军收复两京之战中，霸刀、藏剑等门派为襄助唐军并追查兵器失落之事，前往洛阳。\n长孙笑受柳静海之托，研究尸人的恢复之法，遇到陈月并一路追随她到洛阳独孤九前往洛阳，调查昆仑所藏的霸刀兵器失窃之事。\n徐归道再请独孤修，独孤修出山相助安庆绪柳鸾旗暗通史思明，以风雷刀谷之兵甲援蔡希德。\n又以筹扬刀大会之由，唆使柳秀岳重开千雷殿震离刑炉锻出魔刀 “雷魄”。\n柳秀岳却被刀中煞气所控，与群雄交手后魔刀被趁乱盗走。\n得知史思明已得到魔刀 “雷魄”欲进献给师父交换“不老”之秘后，霸刀山庄派出庄中高手前往夺刀截杀。\n长孙笑随陈月前往龙泉府独孤九受李倓密令前往渤海国借兵。',蓬莱:'757年末，蓬莱门主、侠客岛岛主方乾邀请中原侠士前往侠客岛参加武林大会。',凌雪阁:'林白轩现身天泣林，与凌雪阁成员会面，阻止江湖侠士搭救李倓林白轩升任外阁阁主。',药宗:'陈月在杨上善指点下，动身前往长白寻找药宗踪迹，辗转至白霜谷与陈梦麟相认。',刀宗:'谢云流断祁进一臂，偿祁进当年误杀洛风之事。\n谢云流因一刀流动向有异，前往永王行宫，见到了李重茂，察觉了他的计划。\n莫铭在谢云流的武学中发现一处破绽，谢云流如约还他自由之身，莫铭加入刀宗。',万灵山庄:'颂少风携兽王庄于太原协助抵御狼牙军，中逢奸细，得知当年舜英城惨案皆为丁伯所为，丁伯自尽。\n颂少风带领部分门人先行来到苍梧，整理故园，兽王庄更名万灵山庄。',段氏:null,衍天:null,狼牙:'正月，史思明自博陵、蔡希德自上党、高秀岩自大同、牛廷阶自范阳率兵共十万，会攻太原。\n在始皇武库之中，安庆绪借着献始皇藏宝的机会刺杀安禄山、孑孑、安庆恩于秦陵始皇武库。\n令狐伤从此消沉，退出狼牙。\n安庆绪后请多多推演龙脉所在，以存放安禄山尸首，延续安家血脉。\n徐归道屡次三番入长峰山，得请独孤修出山以助安庆绪。\n苏曼莎被突厥人劫走，令狐伤将之救出。\n9月，徐归道、曹炎烈诈降，引李俶入上阳宫欲除之。\n曹炎烈于上阳宫死于曹雪阳枪下。\n史朝义献部分《九天兵鉴》武学于史思明。\n天策府被大唐将士夺回。\n史思明在狼牙堡归降唐王朝安庆绪败走阴山大草原后，突厥意图拉拢令狐伤，见其并未表态便下手劫走苏曼莎意图胁迫，令狐伤救出苏曼莎。\n独孤九和李重茂分别代表唐和东瀛前往渤海国求助，大钦茂以交出狼牙使者为筹码，保持中立，并向唐邀功，唐朝出于大局考虑，接受了大钦茂的条件。\n大钦茂动用渤海武林与周边海域势力联合，共同进攻东海三家，意图侵吞东海地盘，掠夺他们的资源与航海技术。'}},758:{name:'乾元元年',天下:{朝堂:'乾元元年（七五八）三月二日，徙楚王俶为成王。\n肃宗以张淑妃有宠，又扈从有功，三月六日，立为皇后。\n后喜弄权，渐预朝政。\n端阳家宴  李俶虽已服用煅灵丹（可令身体在短时间内恢复健康，但过时会更加虚弱，且不宜饮酒），但为打消张皇后和肃宗疑虑，坚持饮酒后伤重垂危。\n遇衍天宗九州使南宫茗自减寿命为其保住一丝元魂乾元元年（七五八）五月十九日，立成王俶为皇太子。\n六月，史思明于范阳复叛，史称范阳夜变。\n七月十六日，初铸当十大钱，名为“乾元重宝”，与开元通宝钱并行。\n七月廿四，宁国公主和亲。\n九月廿一,九节度使兵围相州（邺城）季广琛带病赴河南，拜青徐等五州节度使。\n十月,卫州之战 胜。\n十月，乾元重宝开始推行。\n十二月，史思明攻克魏州，李白从浔阳出发流放夜狼李峘任江淮都统安庆绪北逃至邺郡。',江湖:'李重茂作为东瀛特使前往渤海国游说渤海国君，渤海国拒绝借兵大唐源氏一族家主源明玉受兄长源明雅所托，率族中高手前来东海，同时源明雅却为预兆之景所魇。\n源明雅以阴阳归命咒，陷入沉睡莫雨在奋战之际，为无面鬼尹雪尘中伤，既而狂症难遏，背上宝图骤现，失手打伤穆玄英莫雨背后的汉王藏宝图为谢采所察，被剥下莫雨功力尽失，拜王遗风为师，学习红尘一脉武学。\n谢采、月泉淮、李重茂、宫傲携手为祸中原武林月泉淮受史思明之托前往少林，为的是拖住少林众僧，给史朝义盗取曳影剑争取时间。\n并与不老僧渡法一战。\n渡法圆寂，月泉淮重伤阿萨辛现身衍天宗。',九天:'年初，九天于侠客岛召开密会。\n伊玛目假扮卢延鹤之事败露，被囚冰火岛，死亡王玄砚继任幽天君之位。\n李复前往西去金河敖龙岛上，源明雅为多多用阴阳归命咒续命，实则是以龙脉之力为媒的换命之法敖龙岛上，方乾力战月泉淮、谢采、李重茂三位高手，却遭到月泉淮的暗算，被吸取了部分内力赵涵雅醒转，决意前往西域寻找衍天宗的踪迹。',东海:'霸王擂最后一天，海龙会奇袭鲲鹏岛渤海国与日本联军进攻东海，东海首富姜家所辖蔷薇列岛战火四起。\n拥月仙人月泉淮只身奇袭海门关与百川港。\n尹康两家长老：尹喙鹰、康雪折接连折戟，被吸内力而亡为了阻拦取得九天汉王宝藏宝图的谢采，东海三家组建了南溟船队，驶向位于墟海尽头的敖龙岛，而此地亦为多多、源明雅探寻久矣的龙脉所在。\n康宴别离开东海，前往少林。'},门派:{少林:'为寻曳影剑，月泉淮攻上少林，与渡法大战败逃渡法为救入魔的清梵，圆寂于莲花池畔。',纯阳:null,万花:'秋，李重茂勾结香巫教散布蛊毒，万花开谷济世。\n绝情谷开谷李重茂联合东瀛势力及永王旧部攻入万花，毁三星望月欲营造《推背图》被夺的假象，被从东海探亲赶回的东方宇轩击退。\n孙思邈以身渡蛊，逝世。',七秀:'部分弟子前往金水调查十二连环坞秋十二连环坞奇袭七秀，外坊失守。\n广发碧霞神令，召集弟子回坊驰援。\n公孙幽和公孙盈携手抗敌，公孙幽中毒。\n七秀从此取消外坊和内坊之分。',藏剑:'叶琦菲、叶镜池前往东海参加霸王擂，东海事变后，叶琦菲运送最后一批兵器至洛阳，叶镜池返回藏剑。\n七秀遇袭，叶凡夫妇率论剑堂部分弟子驰援七秀谢采率海寇及狼牙军攻入藏剑，与地鼠门联合寻出兵库所在叶蒙夫妇战死，叶麟重伤叶英出关，击伤谢采。',唐门:null,五毒:'衣旎受命探查香巫教。',丐帮:'郭珠和尹拓前往巴陵调查十二连环坞异常动作。',明教:'陆危楼前往青莲狱欲夺袄教秘辛。\n奉火弟子夏派拉蒂奉陆危楼之名前往波斯，不知道为啥在蔷薇列岛上）',天策:'10月，卫州之战胜。\n天策整顿兵马欲随郭子仪前往邺城围攻安庆绪。',苍云:'李复同风夜北西去金河，苍云部分弟子前去接应。',长歌门:'长歌门与李俶李倓兄弟联手杨青月应季广琛之邀北上。',霸刀:'独孤九前往渤海国借兵被拒；\n长孙笑携部分霸刀弟子前往长白，助北天药宗收复宗门柳静海同柳惊涛进攻武氏别院，吸引武人谋注意，声东击西。',蓬莱:'方子游夺得霸王擂魁首谢采叛出蓬莱，步步为营，设下重重圈套中毒被压制内劲的方乾，率麾下部分七枚及弟子方子游前去碧落岛追捕谢采反被暗算敖龙岛上，方乾力战月泉淮、谢采、李重茂三位高手，却遭到月泉淮的暗算，被吸取了部分内力。',凌雪阁:'谢长安任归辰司主司秋，李重茂为营造夺得《推背图》的假象，携东瀛和永王旧部攻入万花。\n林白轩率部分凌雪阁弟子前往支援。',药宗:'陈月召集宗门遗老、弟子，联结霸刀柳家、长孙家一同收复宗门。',刀宗:'敖龙岛龙脉灵力枯竭，九天宝藏的自毁机关开启，在撤离之时，三家众人与谢采等人狭路相逢，谢云流未能劝得李重茂回头，与之割袍断义，并与拦路的月泉淮决战。\n；\n藤原广嗣绑架甘青阳，胁迫藤原康成带《孤锋诀》随其返回东瀛，为谢云流所杀；',万灵山庄:'颂少风彻底化解了与昔年舜英城血案遗属的矛盾，抵御秘密前来抓捕乘黄的狼牙，与乘黄一族再定盟约。',段氏:null,衍天:'本应登基的李俶越来越虚弱，九州使南宫茗自减寿命保住李俶一丝元魂。\n（后为救江湖客与阿萨辛对战而死）衍天宗出世化天劫，聂无极现身达摩洞毁曳影剑；',狼牙:null}},759:{name:'乾元二年',天下:{朝堂:'元月一日，史思明于魏州自立为燕王三月邺城之战，溃败安庆绪被史思明所杀五月施行重轮乾元重宝七月，朝廷问责，郭子仪兵权被罢，召回长安留守;又任李光弼为天下兵马元帅（后经李光弼推辞，最终由赵王李傒为帅，李光弼为副帅，统领各方节度使），代郭子仪统率朔方军。\n九月，史思明南下欲围汴州，汴滑节度使许叔冀投降；\n李光弼当机立断，调令搬空洛阳，并率两万兵马坚守河阳；\n十月，河阳之战。',江湖:'唐廷联合几大江湖门派和浩气盟，对十二连环坞进行彻底围剿，宇文灭、宫傲死亡白帝江关后，浩气盟发布长空令，联合武林正道对抗谢采等人阁罗凤为西开寻传，在苍山洱海召开了武林大会，列九席沙壹之宾。\n乌蒙贵练成“毒神忘情功”重返苗疆，成为南诏王的“沙壹之宾”，并于黑山林海展开新的阴谋，剑指五毒教主之位。\n关键时刻五毒右长老艾黎以冰蝉蛊压制乌蒙贵，乌蒙贵身亡月泉淮受悉达罗摩之约前往黑山林海，以蛇胆汁治疗旧伤。'},门派:{少林:null,纯阳:null,万花:null,七秀:'公孙盈前往白帝江关，击杀宫傲；\n杨逸飞，叶芷青，叶英三方会面，商讨如何抵御叛军。',藏剑:null,唐门:null,五毒:'乌蒙贵为祸黑山林海，五毒众人前往探查对敌；\n艾黎以冰蝉蛊压制乌蒙贵，乌蒙贵亡，艾黎身受重伤，退居二线；\n五毒五圣使换代；\n救治塔纳之事有进展，曲云面见唐书雁，五毒和塔纳冰释前嫌；',丐帮:null,明教:null,天策:'李光弼决心放弃洛阳，守备河阳。\n曹雪阳率天策前往洛阳安置百姓。',苍云:null,长歌门:'唐军欲引漳水灌邺城，杨青月前往支援；\n邺城战败，杨青月失踪，后于洛阳协助天策迁置洛阳百姓；\n约九月，杨青月追查一批由南北运的私盐，率弟子前往楚州调查；',霸刀:'柳静海前往五毒，求亲唐书雁。',蓬莱:null,凌雪阁:'药宗长老秦素问前来长安救治李俶，少侠奉命送药，得知李俶还有二十年光景。',药宗:'秦素问前往长安救治李俶；\n塔纳恢复一事有进展，唐书雁随陈月回宗门试药；',刀宗:null,万灵山庄:null,段氏:'南诏会武后，段慎思以退为进，宣布退任家主之位，并将会在星回节重选新任家主。\n试图用此举将段氏彻底从南诏、吐蕃和大唐之间的斗争中摘除。\n而原本位于融天岭的大理宫，也迁居至洱海，正式更名为大理山庄。\n六月，星回节，段方旬继任家主。',衍天:null,狼牙:null}},760:{name:'上元元年',天下:{朝堂:'十一月，刘展于楚州反叛作乱；\n十二月，淮南节度使邓景山平叛失败，请求田神功率平卢军奉命平叛，田神功部下邙赫达、赵武达趁机与青江盟官商勾结，四处劫掠，致使楚州大乱。'},门派:{少林:null,纯阳:null,万花:null,七秀:null,藏剑:'叶镜池离开北天药宗，受曲云之托于百溪协助追查《天廋》和谢采的消息，自镇海阁地井出来后前往浩气盟复命。',唐门:'唐书雁恢复正常外貌，但功力尽失六月初六，与柳静海成亲。',五毒:'《天廋》为无面鬼尹雪尘所窃，曲云追查得知尹雪尘已逃至百溪，时谢采以蓬莱秘籍《瀚海八蛸》为饵，借镇海阁为媒，引岭南武林人士前往参加祭海节以试验天廋丹和蛸人修炼的效果。',丐帮:null,明教:null,天策:null,苍云:null,长歌门:'楚州之事查明为青江盟副盟主镜演借老盟主病重篡权，与平卢军官商勾结所致，桑来照等人进入潜入绿水含章楼阻止对方不敌，为杨青月所救；\n杨青月追查逃离的赵武达等人，与田神功对峙，杨逸飞现身陈情利害；',霸刀:'柳惊涛托人前往楚州协助杨青月调查私盐去向。',蓬莱:'方子游化名康游追查谢采消息至百溪，后前往镇海阁。',凌雪阁:null,药宗:null,刀宗:null,万灵山庄:null,段氏:null,衍天:null,狼牙:null}},761:{name:'上元二年',天下:{朝堂:'一月，李重茂先是同史思明约定划江而治，后同刘展勾结，携永王旧部、一刀流、香巫教、狼牙等屯兵晟江，与唐军做最后决战；\n二月，李重茂、刘展兵败西津渡，身死。\n三月，史思明于鹿桥驿被儿子史朝义所杀。\n国库空虚，朝廷派遣度支使元载往江淮诸道收取赋税。\n元载以非常手段任命凶吏督办税收之事，张皇后借机暗中动手脚，买通凶吏令其变本加厉，煽动江淮百姓制造乱局，构陷东宫。\n楚州陆续发现“十三宝”，进献长安。',九天:'七月，拓跋思南与柳风骨前往丐帮商议应对月泉淮之法，因叶琦菲查探到卢延鹤被关押之所，二人共赴西域，后因联络点被毁暂无音讯；\n年底，拓跋思南打上冷龙峰，同叶琦菲等人一同救出卢延鹤；\n卢延鹤将九天经纬计较之术传于叶琦菲。',江湖:'穆玄英追查月泉淮的踪迹，前往烂柯山鬼市正月十五，三年一度的烂柯山鬼市重开，月泉淮现身，夺得掩日剑；\n月泉淮连续挑战李白、萧白胭、叶英和谢云流得胜；\n月泉淮于武狱黑牢参透石易之留下的残招，与丐帮洪笑尘对战，胜。\n六月，岑伤于瞿塘峡杀玄净、玄能。\n渤海武林于武狱黑牢中寻得各大派部分武功秘籍的破解之法，并在月泉淮的带领下向中原各大派宣战，两方定于华山银霜口比武。\n【约7-10月之间】月泉淮前往沉剑狂窟。\n7-10月，月泉淮前往沉剑狂窟。\n10月，月泉淮进入九老洞，身死。\n青江盟与张皇后合作，后在韦应物斡旋下转投东宫。'},门派:{少林:'七月，渡会前往君山商讨月泉淮破解之法。\n十月，清梵前往银霜口，得悟求不得之苦。',纯阳:'七月，李忘生前往君山商讨月泉淮破解之法。\n十月，纯阳五子同谢云流于九老洞结成天道剑阵，击败月泉淮。',万花:'七月，东方宇轩前往君山商讨月泉淮破解之法。\n十月，紫晴于银霜口协助医治受伤侠客。',七秀:'萧白胭于七秀迎战月泉淮，惜败。\n七月，萧白胭前往君山商讨月泉淮破解之法。',藏剑:'叶英于藏剑迎战月泉淮，惜败。\n七月，叶英前往君山商讨月泉淮破解之法。',唐门:null,五毒:null,丐帮:'约六月，洪笑尘于武狱黑牢迎战月泉淮，身死；\n七月，君山祭灵，各大派掌门齐聚君山商议应对月泉淮之法，渤海武林人士前往君山滋事。\n十月，郭岩前往银霜口调查后续之事。',明教:null,天策:null,苍云:null,长歌门:'晟江物价飞涨，周宋随周墨前往晟江调查，意外发现晟江本地富商徐家原与李重茂有关，屯粮居奇亦是为了供应李重茂起事。\n见正面交涉不起作用，便决定从粮草大营夺得已经被充作军饷的粮米，但此时颜真卿的昇州旧部为刺史蒙蔽，只能潜入后智取；\n李白行至晟江，与月泉淮一战，惜败。',霸刀:'七月，柳风骨前往君山商讨月泉淮破解之法，后与剑圣因要事外出，又因传信法被毁失联。\n柳如萍前往银霜口比武，惜败。\n柳静海因柳风骨失踪一事前往银霜口召集弟子。',蓬莱:null,凌雪阁:'内阁阁主李泌被张李一党设计，被迫隐退。',药宗:null,刀宗:'方轻崖前往鬼市欲为雨卓承拍下玉芝种子，失败；\n谢云流于刀宗迎战月泉淮，惜败谢云流接到吕洞宾灵龟传讯，赶往银霜口，与九老洞与纯阳五子结成天道剑阵，击败月泉淮。',万灵山庄:'颂南云前往银霜口。',段氏:'余念段出门游历时恰遇柳风骨被围困，出手相助。',衍天:null,狼牙:null}},762:{name:'宝应元年',天下:{朝堂:'张皇后同越王李系勾结，李系将私兵藏匿在山南东道节度使来瑱的军营中，利用来瑱的军营为其私兵的供给做掩护，以作谋反之备。\n同时借王毛仲手下“寒鸦堂”筹措运转粮食以作军粮。\n绛州兵变，急需军粮，张皇后威压东宫，让东宫限期内筹措军粮。\n太子拉李辅国入局，破解张皇后阴谋，和籴成功。\n张皇后已入穷途，借十三宝鉴宝会之由，会同李系发动政变，失败，被李倓所杀；\n李隆基、李亨受到惊扰相继离世。\n李豫继位。\n葛逻禄内乱，原世子去世，葛罗禄叶护派炽俟启前来长安迎炽俟穆康回到葛罗禄，李倓假死前安排江湖客作为使者前往伊丽川。',九天:'3月，为重启九天西域宝库，卢延鹤、李倓、柳风骨前往河西卢延鹤携叶琦菲与永安行重走西域商路，与化名芭德的女儿卢净秋重逢卢延鹤与索家达成合作，一之窟秘宝现世，卢延鹤将三窟宝藏留下其一，依约赠予索家一窟，自行带走一窟后脱离九天李倓借和太子合作之机暗中插手唐廷财政4月，王毛仲现身太极宫，与李倓相搏后离去。\n李倓与王毛仲于太极宫中相搏，重伤，后李复取鬼市玉芝汁液为引挽回一。\n为方便调查王毛仲后续讯息，李倓二次假死隐遁江湖。',恶人谷:'莫雨出关，前往河西协助毕罗巴寻找祆教秘宝。',浩气盟:'穆玄英前往河西调查“夜归人”相关动向，并替剑圣寻找《剑意八变》传人。'},门派:{少林:null,纯阳:null,万花:null,七秀:null,藏剑:'叶琦菲携永安行随卢延鹤共赴河西重走西域商路，得其传授九天经纬计较之术并开启一之窟一之窟秘宝现世，叶琦菲及空城殿一起将宝物运回长安并协助东宫以送纳赋税之名将其送往太府寺入库为方便追查谢采现身伊丽川一事，叶琦菲携永安行以皇商身份与江湖客同往伊丽川。',唐门:null,五毒:null,丐帮:null,明教:null,天策:null,苍云:null,长歌门:'协助刘晏将江淮的粮食运抵长安杨逸飞前往长安。',霸刀:null,蓬莱:null,凌雪阁:'姬别情、叶未晓率“无敌霹雳”小队前往太极宫随行护卫李豫高力士于返京途中听闻李隆基病逝的消息，吐血而亡。',药宗:null,刀宗:null,万灵山庄:null,段氏:'段方旬和余念段为寻回《逝远剑章》前往河西。',衍天:null,狼牙:null}}};async function bc(){console.log('[music-bridge] 阶段一：寻找后台 API 对象...');const c=await function(c=1e4){return new Promise((e,n)=>{const t=Date.now(),l=setInterval(()=>{'object'==typeof top.musicPlayerAPI&&null!==top.musicPlayerAPI?(clearInterval(l),e(top.musicPlayerAPI)):Date.now()-t>c&&(clearInterval(l),n(new Error('连接后台脚本失败。请确认角色卡的脚本开关已打开。若已打开请刷新页面重试。')))},250)})}();return console.log('[music-bridge] 阶段一完成，API 对象已找到。'),console.log('[music-bridge] 阶段二：请求后台初始化...'),await Promise.race([c.requestInitialization(),new Promise((_,c)=>setTimeout(()=>c(new Error('后台脚本初始化超时。如果这是您第一次加载角色卡，请尝试刷新页面。')),1e4))]),console.log('[music-bridge] 阶段二完成，后台已就绪。'),c}function Ec(c){return{isPlaying:'PLAYING'===c.playbackState,masterVolume:c.masterVolume,hasQueue:null!==c.currentItem}}const Vc={class:'relative mx-auto max-w-7xl p-4 md:p-12 lg:p-24'},Nc={style:{flex:'1',display:'flex','flex-direction':'column','min-height':'0'}},Bc={key:'char'},jc={key:'events'},Lc={key:'map',style:{flex:'1','min-height':'0'}},Ac={key:0,class:'mt-auto flex justify-center pt-8 select-none md:justify-start'},_c=(0,t.defineComponent)({__name:'App',setup(c){const e=(0,t.inject)('mvuData');if(!e)throw new Error('[App.vue] mvuData 注入失败，请确保 index.ts 已正确读取 Mvu 数据');const n=e.worldInfo,l=e.characters,a=e.gregorianYear;function o(c){const e=wc[String(c)];if(!e)return[];const n=[];if(e.天下)for(const c of zc){const t=e.天下[c];t&&n.push({tag:c,content:t})}if(e.门派)for(const c of kc){const t=e.门派[c];t&&n.push({tag:c,content:t})}return n}const r={往岁:o(a-1),今岁:o(a),来岁:o(a+1)},s=(0,t.
